<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>To do List</title>
  </head>
  <body>
    <header>
      <h1>Tarefas</h1>
      <span>4 pendentes</span>
    </header>
    <section>
      <form>
        <input type="text" name="tituloTarefas" id="idTituloTarefa" />
        <button type="button">Categoria</button>
        <button type="button">Prioridade</button>
        <button type="button">Data</button>
        <button type="submit">Adicionar</button>
      </form>
      <nav>
        <button type="button">Todas</button>
        <button type="button">Pendentes</button>
        <button type="button">Concluídas</button>
      </nav>
    </section>
    <main>
      <ul>
        <li>
          <input type="checkbox" name="" id="" />
          <span>Revisar apresentação do projeto</span>
          <span>Trabalho</span>
          <span>Venceu ontem</span>
        </li>
      </ul>
    </main>
    <footer>
      <button type="button">Limpar concluídas</button>
    </footer>
    <script src="app.js"></script>
  </body>
</html>
